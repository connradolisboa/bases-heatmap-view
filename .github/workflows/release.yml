name: Release

on:
  push:
    tags:
      - "[0-9]*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm run test
      - run: npm run build
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
      - name: Update dist folder
        run: |
          mkdir -p dist
          cp main.js manifest.json styles.css dist/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: update dist for release ${GITHUB_REF_NAME}"
          git push origin HEAD:master
